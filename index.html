<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Carnet du Barman — Guide des 20 Cocktails Classiques</title>
  <meta name="description" content="Guide de dosage de 20 cocktails classiques : recettes, verres, méthodes et garnitures. Style speakeasy." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ============================================
       TOKENS & RESET
       ============================================ */
    :root {
      --bg-deep: #0b0705;
      --bg-soft: #120c08;
      --bg-card: #1a110b;
      --bg-card-hover: #221610;
      --line: rgba(198, 159, 106, 0.18);
      --line-strong: rgba(198, 159, 106, 0.45);

      --gold: #c69f6a;
      --gold-soft: #d9b988;
      --gold-dim: #8e6f46;
      --copper: #b87333;
      --burgundy: #6d1f2a;

      --text: #efe6d7;
      --text-dim: #b6a78e;
      --text-muted: #7a6e5a;

      --serif: 'Playfair Display', 'Cormorant Garamond', Georgia, serif;
      --serif-alt: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

      --radius: 4px;
      --radius-lg: 10px;
      --shadow-card: 0 10px 30px rgba(0, 0, 0, 0.55), 0 1px 0 rgba(255, 255, 255, 0.02) inset;
      --shadow-card-hover: 0 18px 50px rgba(0, 0, 0, 0.75), 0 0 0 1px var(--line-strong) inset;

      --ease: cubic-bezier(0.2, 0.7, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg-deep);
      color: var(--text);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Ambient background — subtle vignette + grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(1200px 600px at 15% -10%, rgba(198, 159, 106, 0.08), transparent 60%),
        radial-gradient(900px 500px at 110% 20%, rgba(109, 31, 42, 0.18), transparent 55%),
        radial-gradient(800px 600px at 50% 120%, rgba(184, 115, 51, 0.07), transparent 60%);
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.035;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.8  0 0 0 0 0.65  0 0 0 0 0.4  0 0 0 0.6 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    }

    main, header, footer, section { position: relative; z-index: 1; }

    a { color: var(--gold); text-decoration: none; }
    a:hover { color: var(--gold-soft); }

    ::selection { background: var(--gold); color: var(--bg-deep); }

    /* ============================================
       LAYOUT
       ============================================ */
    .wrap {
      width: 100%;
      max-width: 1240px;
      margin: 0 auto;
      padding: 0 28px;
    }

    /* ============================================
       HEADER / HERO
       ============================================ */
    .site-header {
      padding: 72px 0 40px;
      text-align: center;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.25) 100%);
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      color: var(--gold);
      font-family: var(--serif);
      font-style: italic;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      font-size: 12px;
    }
    .brand-mark::before,
    .brand-mark::after {
      content: '';
      display: inline-block;
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }

    .site-title {
      font-family: var(--serif);
      font-weight: 700;
      font-size: clamp(2.4rem, 5.5vw, 4.4rem);
      line-height: 1.05;
      margin: 18px 0 14px;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .site-title em {
      font-style: italic;
      font-weight: 400;
      color: var(--gold);
    }

    .site-tagline {
      font-family: var(--serif-alt);
      font-style: italic;
      font-size: clamp(1.05rem, 1.6vw, 1.25rem);
      color: var(--text-dim);
      max-width: 640px;
      margin: 0 auto;
    }

    .divider-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 28px auto 0;
      color: var(--gold-dim);
    }
    .divider-ornament .line {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim));
    }
    .divider-ornament .line + .line {
      background: linear-gradient(90deg, var(--gold-dim), transparent);
    }
    .divider-ornament .diamond {
      width: 8px;
      height: 8px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    /* ============================================
       FILTERS
       ============================================ */
    .filters {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 20px 0;
      background: rgba(11, 7, 5, 0.82);
      backdrop-filter: blur(14px) saturate(1.1);
      -webkit-backdrop-filter: blur(14px) saturate(1.1);
      border-bottom: 1px solid var(--line);
    }
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
    }
    .filter-label {
      font-family: var(--serif-alt);
      font-style: italic;
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-right: 8px;
      letter-spacing: 0.05em;
    }
    .chip {
      appearance: none;
      border: 1px solid var(--line-strong);
      background: transparent;
      color: var(--text-dim);
      font-family: var(--sans);
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 10px 18px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 280ms var(--ease);
      position: relative;
    }
    .chip:hover {
      color: var(--gold-soft);
      border-color: var(--gold-dim);
      background: rgba(198, 159, 106, 0.06);
    }
    .chip.is-active {
      color: var(--bg-deep);
      background: var(--gold);
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(198, 159, 106, 0.12);
    }

    /* ============================================
       GRID
       ============================================ */
    .grid-section {
      padding: 56px 0 96px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 26px;
    }

    /* ============================================
       COCKTAIL CARD (style only, no data yet)
       ============================================ */
    .card {
      position: relative;
      background: linear-gradient(160deg, var(--bg-card) 0%, var(--bg-soft) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 32px 28px 28px;
      box-shadow: var(--shadow-card);
      overflow: hidden;
      transition: transform 400ms var(--ease), box-shadow 400ms var(--ease), border-color 400ms var(--ease);
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(500px 200px at 100% 0%, rgba(198, 159, 106, 0.08), transparent 60%);
      opacity: 0;
      transition: opacity 400ms var(--ease);
      pointer-events: none;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: var(--line-strong);
      box-shadow: var(--shadow-card-hover);
    }
    .card:hover::before { opacity: 1; }

    .card-category {
      display: inline-block;
      font-family: var(--serif-alt);
      font-style: italic;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }
    .card-title {
      font-family: var(--serif);
      font-weight: 700;
      font-size: 1.7rem;
      line-height: 1.15;
      margin: 0 0 18px;
      color: var(--text);
    }
    .card-divider {
      width: 36px;
      height: 1px;
      background: var(--gold-dim);
      margin: 0 0 20px;
    }

    /* Ingredients list */
    .ingredients {
      list-style: none;
      margin: 0 0 22px;
      padding: 0;
    }
    .ingredients li {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px dashed rgba(198, 159, 106, 0.14);
      font-size: 0.95rem;
    }
    .ingredients li:last-child { border-bottom: none; }
    .ingredient-name {
      color: var(--text);
      flex: 1;
    }
    .ingredient-dots {
      flex: 1;
      border-bottom: 1px dotted rgba(198, 159, 106, 0.2);
      transform: translateY(-4px);
      min-width: 12px;
    }
    .ingredient-dose {
      color: var(--gold-soft);
      font-variant-numeric: tabular-nums;
      font-weight: 500;
      white-space: nowrap;
      font-family: var(--serif-alt);
      font-size: 1.02rem;
      letter-spacing: 0.01em;
    }

    /* Meta grid (glass / method) */
    .card-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
      padding: 14px 0 0;
      border-top: 1px solid var(--line);
    }
    .meta-block .meta-label {
      display: block;
      font-family: var(--serif-alt);
      font-style: italic;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .meta-block .meta-value {
      font-size: 0.92rem;
      color: var(--text-dim);
      line-height: 1.35;
    }

    /* Garnish */
    .garnish {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 12px;
      font-size: 0.9rem;
      color: var(--text-dim);
      line-height: 1.5;
    }
    .garnish::before {
      content: '❦';
      color: var(--gold);
      font-size: 1rem;
      line-height: 1.3;
      flex-shrink: 0;
    }

    /* Notes / tips / warnings */
    .notes {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px dashed rgba(198, 159, 106, 0.18);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .note {
      font-family: var(--serif-alt);
      font-style: italic;
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text-dim);
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    .note .tag {
      font-family: var(--sans);
      font-style: normal;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 3px;
      flex-shrink: 0;
      margin-top: 2px;
      line-height: 1.4;
      font-weight: 500;
    }
    .note .tag.tip { background: rgba(198, 159, 106, 0.14); color: var(--gold-soft); }
    .note .tag.info { background: rgba(198, 159, 106, 0.08); color: var(--gold-dim); }
    .note .tag.warn { background: rgba(109, 31, 42, 0.55); color: #e7bfc4; }

    /* Empty state */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-family: var(--serif-alt);
      font-style: italic;
      font-size: 1.1rem;
    }

    /* Entrance animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card {
      animation: fadeUp 600ms var(--ease) both;
    }

    /* ============================================
       FOOTER
       ============================================ */
    .site-footer {
      padding: 40px 0 60px;
      border-top: 1px solid var(--line);
      text-align: center;
      color: var(--text-muted);
      font-family: var(--serif-alt);
      font-style: italic;
      font-size: 0.95rem;
    }
    .site-footer .line {
      display: block;
      width: 80px;
      height: 1px;
      background: var(--gold-dim);
      margin: 0 auto 18px;
      opacity: 0.5;
    }

    /* ============================================
       RESPONSIVE
       ============================================ */
    @media (max-width: 720px) {
      .wrap { padding: 0 18px; }
      .site-header { padding: 48px 0 28px; }
      .filters { padding: 14px 0; }
      .filter-label { display: none; }
      .chip { padding: 8px 14px; font-size: 0.75rem; letter-spacing: 0.12em; }
      .grid-section { padding: 36px 0 72px; }
      .grid { grid-template-columns: 1fr; gap: 18px; }
      .card { padding: 26px 22px 22px; }
      .card-title { font-size: 1.45rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>

        garnish: "Cerise au marasquin (Luxardo) ou zeste d'orange"
      },
      {
        name: 'Mai Tai',
        category: 'sophistiques',
        ingredients: [
          ['Rhum blanc', '3 cl'],
          ['Rhum ambré ou vieux', '3 cl'],
          ['Triple Sec / Orange Curaçao', '1,5 cl'],
          ["Sirop d'orgeat", '1,5 cl'],
          ['Jus de citron vert frais', '3 cl']
        ],
        glass: 'Tiki Mug',
        method: 'Shaker sur glace pilée',
        garnish: 'Branche de menthe, citron vert, paille bambou'
      },
      {
        name: 'Whiskey Sour',
        category: 'sophistiques',
        ingredients: [
          ['Bourbon Whiskey', '5 cl'],
          ['Jus de citron jaune frais', '3 cl'],
          ['Sirop de sucre de canne', '2 cl'],
          ["Blanc d'œuf", '1 (ou 3 cl)'],
          ['Angostura Bitters', '2 traits']
        ],
        glass: 'Rocks ou Coupe',
        method: "Dry Shake (15 s sans glace), puis Wet Shake",
        garnish: 'Mousse décorée aux bitters',
        notes: [{ tag: 'tip', text: 'Dessiner sur la mousse avec les bitters pour la finition.' }]
      },
      {
        name: 'Bloody Mary',
        category: 'sophistiques',
        ingredients: [
          ['Vodka', '5 cl'],
          ['Jus de tomate', '10-12 cl'],
          ['Jus de citron frais', '1,5 cl'],
          ['Sauce Worcestershire', '3 traits'],
          ['Tabasco', '2-5 traits'],
          ['Sel de céleri + poivre noir', 'pincée']
        ],
        glass: 'Highball',
        method: 'Rolling (verser de haut en bas)',
        garnish: 'Branche de céleri, olive, bord sel de céleri'
      },
      {
        name: 'Long Island Iced Tea',
        category: 'sophistiques',
        ingredients: [
          ['Vodka', '1,5 cl'],
          ['Tequila Blanco', '1,5 cl'],
          ['Rhum blanc', '1,5 cl'],
          ['Gin', '1,5 cl'],
          ['Triple Sec', '1,5 cl'],
          ['Jus de citron frais', '3 cl'],
          ['Sirop de sucre', '1 cl'],
          ['Cola', 'splash']
        ],
        glass: 'Highball XXL',
        method: 'Shaker + top cola',
        garnish: 'Rondelle de citron',
        notes: [{ tag: 'warn', text: '~25 % ABV effectif — à doser avec prudence.' }]
      }
    ];

    // ============================================
    // RENDER
    // ============================================
    (function () {
      const grid = document.getElementById('grid');

      const escape = (str) => String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

      const cardHTML = (c, i) => {
        const ingredients = c.ingredients.map(([n, d]) => `
          <li>
            <span class="ingredient-name">${escape(n)}</span>
            <span class="ingredient-dots" aria-hidden="true"></span>
            <span class="ingredient-dose">${escape(d)}</span>
          </li>`).join('');

        const notes = (c.notes && c.notes.length)
          ? `<div class="notes">${c.notes.map(n => `
              <p class="note"><span class="tag ${escape(n.tag)}">${n.tag === 'warn' ? 'Attention' : n.tag === 'tip' ? 'Astuce' : 'Note'}</span><span>${escape(n.text)}</span></p>
            `).join('')}</div>`
          : '';

        return `
          <article class="card" role="listitem" data-category="${escape(c.category)}" style="animation-delay: ${i * 40}ms">
            <span class="card-category">${escape(CATEGORIES[c.category])}</span>
            <h2 class="card-title">${escape(c.name)}</h2>
            <div class="card-divider"></div>
            <ul class="ingredients">${ingredients}</ul>
            <div class="card-meta">
              <div class="meta-block">
                <span class="meta-label">Verre</span>
                <span class="meta-value">${escape(c.glass)}</span>
              </div>
              <div class="meta-block">
                <span class="meta-label">Méthode</span>
                <span class="meta-value">${escape(c.method)}</span>
              </div>
            </div>
            <p class="garnish"><span>${escape(c.garnish)}</span></p>
            ${notes}
          </article>`;
      };

      grid.innerHTML = COCKTAILS.map(cardHTML).join('');

      // ========= FILTER =========
      const chips = document.querySelectorAll('.chip');
      chips.forEach(chip => {
        chip.addEventListener('click', () => {
          chips.forEach(c => c.classList.remove('is-active'));
          chip.classList.add('is-active');

          const filter = chip.dataset.filter;
          const cards = grid.querySelectorAll('.card');
          let shown = 0;
          cards.forEach((card, idx) => {
            const match = filter === 'all' || card.dataset.category === filter;
            card.style.display = match ? '' : 'none';
            if (match) {
              card.style.animation = 'none';
              // reflow then replay animation
              void card.offsetWidth;
              card.style.animation = `fadeUp 500ms var(--ease) both`;
              card.style.animationDelay = `${shown * 30}ms`;
              shown++;
            }
          });
        });
      });
    })();
  </script>
</body>
</html>
